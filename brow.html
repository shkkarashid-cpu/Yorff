  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Tarjeta principal: acoge tanto el video como el texto y botón */
    .card {
      background: rgba(255, 255, 255, 0.98);
      max-width: 780px;
      width: 100%;
      padding: 2rem 2rem 2.8rem;
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.02);
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.25);
    }

    /* Contenedor del video: sustituye el espacio que ocuparía la imagen original */
    .video-container {
      margin-bottom: 2rem;
      border-radius: 1.5rem;
      overflow: hidden;
      background: #0000000d;
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
      line-height: 0; /* elimina espacio extra debajo del iframe/webcomponent */
    }

    /* Estilos para el smartplayer: centrado y ancho completo */
    vturb-smartplayer {
      display: block;
      margin: 0 auto;
      width: 100%;
      aspect-ratio: 16 / 9; /* Para mantener proporción profesional mientras carga */
      background: #0a0c10;
    }

    /* Texto principal equivalente al de la imagen original, traducido al español */
    .mensaje {
      font-size: 1.65rem;
      line-height: 1.45;
      color: #0a1e2f;
      font-weight: 500;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    /* Palabra GRATIS destacada */
    .gratis-destacado {
      background: linear-gradient(125deg, #c2410c, #e07a2c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
      display: inline-block;
    }

    /* Botón VER AHORA → redirige a thegoogle.html */
    .btn-watch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: linear-gradient(105deg, #0f2b3d 0%, #1b4a6e 100%);
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 0.9rem 2.2rem;
      border-radius: 60px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 10px 20px -8px rgba(0, 32, 64, 0.3);
      border: none;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .btn-watch:hover {
      background: linear-gradient(105deg, #1b4a6e, #0f2b3d);
      transform: translateY(-4px);
      box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.35);
    }

    .btn-watch:active {
      transform: translateY(2px);
      transition: 0.05s linear;
    }

    .btn-watch .arrow {
      font-size: 1.3rem;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .btn-watch:hover .arrow {
      transform: translateX(5px);
    }

    /* Responsive: ajusta padding y tamaños en móviles */
    @media (max-width: 640px) {
      .card {
        padding: 1.5rem 1.2rem 2rem;
      }
      .mensaje {
        font-size: 1.35rem;
      }
      .btn-watch {
        font-size: 1.1rem;
        padding: 0.75rem 1.8rem;
        gap: 0.5rem;
      }
      .btn-watch .arrow {
        font-size: 1.15rem;
      }
    }

    /* Soporte para cuando el reproductor aún no está listo: fondo elegante */
    .video-container:empty {
      background: #e9eef3;
      border-radius: 1.5rem;
      min-height: 220px;
    }
  </style>
</head>
