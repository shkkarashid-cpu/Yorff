<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación de Cocina</title>
    <style>
        body {
            background-color: maroon; /* Cor de fundo marrom escura similar à imagem */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .presentation-container {
            text-align: center;
            max-width: 600px; /* Ajuste conforme necessário */
            padding: 20px;
        }
        .presentation-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px; /* Bordas arredondadas da imagem */
            margin-bottom: 20px;
        }
        .headline {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .highlight {
            font-weight: bold;
            color: red; /* Destaque em vermelho para 'GRATIS!' */
        }
        .watch-button {
            display: inline-block;
            background-color: #f44336; /* Vermelho do botão (exemplo de cor, ajuste se desejar) */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
        }
        .watch-button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="presentation-container">
        <img src="imagen_presentacion.jpg" alt="Imagen de preparación de cocina (aceite sobre melón a la izquierda, especias a la derecha)" class="presentation-image">
        
        <p class="headline">Haga clic en el botón de abajo para ver la presentación <span class="highlight">GRATIS!</span></p>
        
        <a href="thegoogle.html" class="watch-button">VER AHORA →</a>
    </div>
</body>
</html>
