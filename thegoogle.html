            text-align: center;
            padding: 12px 15px;
            font-size: 14px;

            background-color: #000;
            overflow: hidden;

        /* Alerta de Áudio */
        .audio-alert {
            margin-top: 15px;
            background-color: #f0f2f5;
            color: #444;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e4e6eb;
        }
        .pulse-icon {
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

    <!-- Scripts de Dinamismo -->
    <script>
        // 1. Lógica da Data Automática
        const dateElement = document.getElementById('dynamic-date');
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0'); // Janeiro é 0!
        const yyyy = today.getFullYear();
        dateElement.innerText = dd + '/' + mm + '/' + yyyy;

        // 2. Lógica de Pessoas Assistindo
        const viewersElement = document.getElementById('live-viewers');
        let currentViewers = Math.floor(Math.random() * (850 - 800 + 1)) + 800; 
        viewersElement.innerText = currentViewers;

        setInterval(() => {
            const fluctuation = Math.floor(Math.random() * 8) - 2;
            currentViewers += fluctuation;
            
            viewersElement.style.backgroundColor = "rgba(255,255,255,0.5)";
            setTimeout(() => {
                 viewersElement.style.backgroundColor = "rgba(255,255,255,0.2)";
            }, 300);

            viewersElement.innerText = currentViewers;
        }, 4000);
    </script>
