    <!-- Script de Data e Viewers Automáticos em JS puro -->
    <script>
        // Data automática
        const dateElement = document.getElementById('dynamic-date');
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateElement.innerText = dd + '/' + mm + '/' + yyyy;

        // Viewers flutuantes (começando em 836)
        const viewersElement = document.getElementById('dynamic-viewers');
        let currentViewers = 836; 

        setInterval(() => {
            const fluctuation = Math.floor(Math.random() * 7) - 3;
            currentViewers += fluctuation;
            if (currentViewers < 800) currentViewers = 800; // Segurança
            viewersElement.innerText = currentViewers;
        }, 5000); 
    </script>
